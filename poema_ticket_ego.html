<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Poem · @sebastiangrimaldos</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0e0e0e;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 3rem 2rem;
    }

    .canvas {
      max-width: 560px;
      width: 100%;
      text-align: center;
    }

    .deco {
      font-family: Georgia, serif;
      font-size: 13px;
      color: #888;
      letter-spacing: 3px;
      margin-bottom: 2.5rem;
    }

    .poem-line {
      font-family: Georgia, serif;
      font-size: 19px;
      font-weight: 400;
      color: #e8e8e8;
      line-height: 1.85;
    }

    .poem-ego {
      font-family: Georgia, serif;
      font-size: 19px;
      font-style: italic;
      color: #aaaaaa;
      margin-top: 2rem;
    }

    .divider {
      border: none;
      border-top: 0.5px solid #2a2a2a;
      width: 200px;
      margin: 2.2rem auto;
    }

    .soy-vivo {
      font-family: Georgia, serif;
      font-size: 13.5px;
      color: #666;
      letter-spacing: 8px;
    }

    .divider-sm {
      border: none;
      border-top: 0.5px solid #1e1e1e;
      width: 120px;
      margin: 1.8rem auto;
    }

    .firma {
      font-family: Georgia, serif;
      font-size: 11.5px;
      color: #555;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
<div class="canvas">

  <p class="deco">— —</p>

  <div>
    <p class="poem-line">if you see life as an amusement park</p>
    <p class="poem-line">you are given a ticket you have to use</p>
    <p class="poem-line">all the time, for this experience —</p>
    <p class="poem-line">but don't think you are the ticket.</p>
    <p class="poem-line">you need it, but it's not you.</p>
  </div>

  <p class="poem-ego">the so-called ego — is the I</p>

  <hr class="divider">

  <p class="soy-vivo">soy · vivo · existo</p>

  <hr class="divider-sm">

  <p class="firma">@sebastiangrimaldos</p>

</div>
</body>
</html>
